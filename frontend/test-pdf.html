<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <h1>PDF Export Test</h1>
    <button onclick="testPDF()">Test Simple PDF</button>
    <button onclick="testTablePDF()">Test Table PDF</button>
    <button onclick="testSchedulePDF()">Test Schedule PDF</button>

    <script>
        function testPDF() {
            console.log('Testing simple PDF...');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text('Hello World!', 10, 10);
            doc.save('test-simple.pdf');
            console.log('Simple PDF created!');
        }

        function testTablePDF() {
            console.log('Testing table PDF...');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.autoTable({
                head: [['Name', 'Age', 'City']],
                body: [
                    ['John', '25', 'New York'],
                    ['Jane', '30', 'London'],
                    ['Bob', '35', 'Paris']
                ]
            });
            
            doc.save('test-table.pdf');
            console.log('Table PDF created!');
        }

        function testSchedulePDF() {
            console.log('Testing schedule PDF...');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });
            
            // Title
            doc.setFontSize(18);
            doc.text("Teacher's Schedule", 14, 15);
            
            // Table data
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const tableData = [];
            for (let d = 0; d < 5; d++) {
                const row = [days[d], 'CE-301', 'CE-302', 'Break', 'CE-303', '-', '-', '-'];
                tableData.push(row);
            }
            
            // Add table
            doc.autoTable({
                head: [['Day', 'Slot 1', 'Slot 2', 'Slot 3', 'Slot 4', 'Slot 5', 'Slot 6', 'Slot 7', 'Slot 8']],
                body: tableData,
                startY: 28,
                styles: { fontSize: 8, cellPadding: 2 },
                headStyles: { fillColor: [71, 85, 105], fontStyle: 'bold' },
                columnStyles: {
                    0: { fontStyle: 'bold', fillColor: [248, 250, 252] }
                }
            });
            
            // Add summary
            const finalY = doc.lastAutoTable.finalY + 10;
            doc.setFontSize(10);
            doc.text('Theory Hours: 12', 14, finalY);
            doc.text('Lab Hours: 6', 70, finalY);
            doc.text('Total Contact Hours: 18', 120, finalY);
            
            doc.save('test-schedule.pdf');
            console.log('Schedule PDF created!');
        }
    </script>
</body>
</html>
